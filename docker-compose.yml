version: "3.7"

services:
  django:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - django_static_volume:/usr/src/app/static
    expose:
      - 8000
    env_file:
      - ./backend/.env
    command: gunicorn mainapp.wsgi:application --bind 0.0.0.0:8000
    depends_on:
      - db
  db:
    image: postgres:16beta1-alpine3.18
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    env_file:
      - ./postgres/.env
  next:
    build:
      context: ./frontend/next_app
      dockerfile: Dockerfile
      args:
        - API_SERVER=${ENV_API_SERVER}
    volumes:
      - next_static_volume:/usr/src/app/build/static
    expose:
      - 3000
    env_file:
      - .env
    command: node server.js
    depends_on:
      - django

  nginx:
    restart: always
    build: ./nginx
    volumes:
      - django_static_volume:/usr/src/app/django_files/static
      - next_static_volume:/usr/src/app/next_files/static
    ports:
      - 8080:80
    depends_on:
      - next

volumes:
  postgres_data:
  django_static_volume:
  next_static_volume: